[project]
name = "rimsave"
version = "0.1.0"
description = "Parse RimWorld .rws saves into typed Python records."
requires-python = ">=3.11"
dependencies = ["lxml>=5.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rimsave"]
