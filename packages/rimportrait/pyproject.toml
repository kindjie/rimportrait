[project]
name = "rimportrait"
version = "0.1.0"
description = "Generate AI-image prompt context blocks from RimWorld .rws saves."
requires-python = ">=3.11"
dependencies = ["lxml>=5.0", "rimsave"]

[project.scripts]
rimportrait = "rimportrait.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rimportrait"]

[tool.uv.sources]
rimsave = { workspace = true }
